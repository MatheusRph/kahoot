<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALERTA DE SEGURANÇA</title>
    <style>
        :root {
            --danger: #ff003c;
            --black: #050505;
            --white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: var(--black);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #main-content {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Efeito de Flash */
        #flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
        }

        .flash-animation {
            animation: flash-effect 0.5s ease-out;
        }

        @keyframes flash-effect {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.8) 100%);
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            box-sizing: border-box;
            border: 20px solid transparent;
            transition: border-color 0.5s;
        }

        .ui-overlay.active {
            border-color: var(--danger);
        }

        .warning-header {
            text-align: center;
            z-index: 20;
        }

        .warning-header h1 {
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 900;
            margin: 0;
            color: var(--danger);
            text-shadow: 0 0 20px rgba(255, 0, 60, 0.5);
            letter-spacing: -2px;
        }

        .capture-box {
            position: relative;
            width: 300px;
            height: 400px;
            border: 2px solid var(--danger);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 0, 60, 0.3);
            background: #111;
            z-index: 15;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .capture-box.active {
            opacity: 1;
            transform: scale(1);
        }

        .capture-box canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .rec-dot {
            width: 15px;
            height: 15px;
            background: var(--danger);
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .footer-info {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--white);
            z-index: 20;
            background: var(--danger);
            padding: 10px 30px;
            transform: skew(-10deg);
        }

        .permission-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--black);
            z-index: 500;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 5px solid #222;
            border-top: 5px solid var(--danger);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="flash"></div>

    <div id="permission-screen" class="permission-screen">
        <div class="loader"></div>
        <h2>Aguardando Câmera...</h2>
        <p style="color: #666;">Clique em "Permitir" para continuar o teste.</p>
    </div>

    <div id="main-content">
        <video id="webcam" autoplay playsinline></video>
        
        <div class="ui-overlay" id="overlay">
            <div class="warning-header">
                <h1>VC FOI FISGADO</h1>
                <div style="color: white; font-size: 1.5rem; font-weight: 800; margin-top: -10px; text-transform: uppercase; letter-spacing: 5px;">QUEBRAMOS O SEU PIN</div>
            </div>

            <div class="capture-box" id="capture-box">
                <canvas id="snapshot"></canvas>
                <div style="position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.7); padding:5px 10px; font-size:10px; display:flex; align-items:center;">
                    <span class="rec-dot"></span> CAPTURA_ID: 8829-X
                </div>
            </div>

            <div style="display:flex; justify-content:center;">
                <div class="footer-info">TESTE DE PHISHING CONCLUIDO</div>
            </div>
        </div>
    </div>

    <script>
        async function init() {
            const video = document.getElementById('webcam');
            const canvas = document.getElementById('snapshot');
            const context = canvas.getContext('2d');
            const permissionScreen = document.getElementById('permission-screen');
            const flash = document.getElementById('flash');
            const captureBox = document.getElementById('capture-box');
            const overlay = document.getElementById('overlay');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 1280, height: 720 }, 
                    audio: false 
                });
                
                video.srcObject = stream;
                
                // Quando o vídeo começar a tocar
                video.onloadedmetadata = () => {
                    video.play();
                    video.style.opacity = "1";
                    
                    // Esconde tela de carregamento
                    permissionScreen.style.opacity = "0";
                    setTimeout(() => permissionScreen.style.display = "none", 800);

                    // Efeito de captura após 1.5 segundos
                    setTimeout(() => {
                        // Tira a "foto"
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        context.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        // Dispara o flash
                        flash.classList.add('flash-animation');
                        
                        // Mostra a moldura de captura
                        captureBox.classList.add('active');
                        overlay.classList.add('active');
                    }, 1500);
                };

            } catch (err) {
                // Mesmo se o usuário negar a câmera, o phishing foi "concluído" (ele chegou até aqui)
                permissionScreen.style.opacity = "0";
                setTimeout(() => {
                    permissionScreen.style.display = "none";
                    overlay.classList.add('active');
                    captureBox.classList.add('active');
                    captureBox.innerHTML = `
                        <div style="text-align:center; padding: 20px; color: var(--danger);">
                            <div style="font-size: 40px; margin-bottom: 10px;">⚠️</div>
                            <div style="font-weight: bold;">ACESSO BLOQUEADO</div>
                            <div style="font-size: 12px; margin-top: 10px; color: #888;">A câmera foi bloqueada, mas em um ataque real, outras vulnerabilidades poderiam ser exploradas.</div>
                        </div>
                    `;
                }, 800);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
